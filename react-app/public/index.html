<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#3b82f6" />
  <meta name="description" content="AllergyDetect - определение аллергенов по фотографии продуктов" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <title>AllergyDetect | Определение аллергенов по фото</title>

  <!-- JSON-LD через inline script -->
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "AllergyDetect",
        "description": "Определение аллергенов по фотографии продуктов",
        "url": "https://allergydetect.com",
        "applicationCategory": "Health & Wellness",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "RUB"
        },
        "featureList": [
          "Определение аллергенов по фото",
          "Хранение истории анализов",
          "Персонализированные рекомендации"
        ]
      }
    </script>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>

</html>
