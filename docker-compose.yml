services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: grant_access
      MINIO_ROOT_PASSWORD: ai_food_analysing
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 grant_access ai_food_analysing &&
      /usr/bin/mc mb myminio/ingredients --ignore-existing &&
      /usr/bin/mc anonymous set download myminio/ingredients &&
      echo '✅ MinIO bucket configured successfully' &&
      exit 0
      "
    restart: "no"  # Запускается один раз и останавливается

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - OLLAMA_HOST=0.0.0.0
    command: serve
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
      - /etc/localtime:/etc/localtime:ro
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: /bin/sh
    command: -c "echo 'Waiting for Ollama...' && sleep 5 && echo 'Checking model...' && ollama list | grep qwen3-vl:4b || ollama pull qwen3-vl:4b && echo 'Model ready!' && exit 0"
    restart: "no"

  backend:
    build: ./python-app
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=grant_access
      - MINIO_SECRET_KEY=ai_food_analysing
      - MINIO_BUCKET_NAME=ingredients
      - MINIO_SECURE=false
      - DATABASE_PATH=/app/data/app.db
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - CORS_ORIGINS=http://localhost:3000
      - HOST=0.0.0.0
      - PORT=8000
      - ENVIRONMENT=development
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - backend_data:/app/data
      - ./python-app:/app
    depends_on:
      - minio
      - minio-init
      - ollama
      - ollama-init
    restart: unless-stopped

  frontend:
    build: ./react-app
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  minio_data:
  ollama_data:
  backend_data: